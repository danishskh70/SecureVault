{% extends 'base.html' %}
{% block title %}Reject Request{% endblock %}
{% block content %}
<div style="max-width:480px;margin:0 auto;">
    <div class="card" style="text-align:center;padding:2.5rem;">
        <div style="font-size:40px;margin-bottom:1rem;">❌</div>
        <h1>Reject Request?</h1>
        <p style="color:#888;margin-top:.5rem;font-size:14px;">
            Reject <strong>{{ join_request.user.username }}</strong>'s request to join
            <strong>{{ join_request.team.name }}</strong>?
        </p>
        <div class="actions" style="justify-content:center;margin-top:1.5rem;">
            <form method="post">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger">Yes, Reject</button>
            </form>
            <a href="{% url 'join_requests' %}" class="btn btn-ghost">Cancel</a>
        </div>
    </div>
</div>
{% endblock %}
