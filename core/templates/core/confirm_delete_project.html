{% extends 'base.html' %}
{% block title %}Delete Project{% endblock %}
{% block content %}
<div style="max-width:480px;margin:0 auto;">
    <div class="card" style="text-align:center;padding:2.5rem;">
        <div style="font-size:40px;margin-bottom:1rem;">⚠️</div>
        <h1>Delete Project?</h1>
        <p style="color:#888;margin-top:.5rem;font-size:14px;">
            Deleting <strong>{{ project.name }}</strong> will permanently remove
            all its secrets too. This cannot be undone.
        </p>
        <div class="actions" style="justify-content:center;margin-top:1.5rem;">
            <form method="post">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger">Yes, Delete Project</button>
            </form>
            <a href="{% url 'project_list' %}" class="btn btn-ghost">Cancel</a>
        </div>
    </div>
</div>
{% endblock %}
