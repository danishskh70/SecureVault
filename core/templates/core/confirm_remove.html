{% extends 'base.html' %}
{% block title %}Remove Member{% endblock %}
{% block content %}
<div style="max-width:480px;margin:0 auto;">
    <div class="card" style="text-align:center;padding:2.5rem;">
        <div style="font-size:40px;margin-bottom:1rem;">👤</div>
        <h1>Remove Member?</h1>
        <p style="color:#888;margin-top:.5rem;font-size:14px;">
            Remove <strong>{{ target.user.username }}</strong> from the team?
            Their account will not be deleted.
        </p>
        <div class="actions" style="justify-content:center;margin-top:1.5rem;">
            <form method="post">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger">Yes, Remove</button>
            </form>
            <a href="{% url 'member_list' %}" class="btn btn-ghost">Cancel</a>
        </div>
    </div>
</div>
{% endblock %}
